<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Visual Engine</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">OpenWeatherMap powered</p>
          <h1>Weather Visual Engine</h1>
        </div>
        <div class="actions">
          <button class="icon-button" id="geoButton" type="button" title="Auto detect city" aria-label="Auto detect city">⌖</button>
          <div class="unit-toggle" role="group" aria-label="Temperature unit">
            <button class="active" id="metricButton" type="button" data-unit="metric">°C</button>
            <button id="imperialButton" type="button" data-unit="imperial">°F</button>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="city-panel">
          <form class="search-row" id="weatherForm">
            <label class="field">
              <span>City Manager</span>
              <input id="cityInput" name="city" type="search" placeholder="Add a city" autocomplete="address-level2" />
            </label>
            <button type="submit">Add</button>
          </form>
          <div class="city-list" id="cityList" aria-label="Saved cities"></div>
          <p class="status" id="statusText" aria-live="polite"></p>
        </aside>

        <section class="visual-stage" id="visualStage" aria-live="polite">
          <div class="empty-state" id="emptyState">
            <strong>No weather loaded</strong>
            <span>Use auto detect or add a city to render the visual engine.</span>
          </div>

          <div class="weather-content hidden" id="weatherContent">
            <section class="scene-card hidden" id="sceneCard">
              <img id="sceneImage" alt="Generated isometric weather scene" />
              <div class="keyword-scene hidden" id="keywordScene">
                <div class="keyword-header">
                  <span id="keywordBadge"></span>
                  <strong id="keywordTitle"></strong>
                  <small id="keywordSubtitle"></small>
                </div>
                <div class="keyword-list" id="keywordList"></div>
                <div class="keyword-highlights" id="keywordHighlights"></div>
              </div>
              <p id="sceneStatus"></p>
            </section>

            <section class="festival hidden" id="festivalCard">
              <p id="festivalName"></p>
              <h2 id="festivalHeadline"></h2>
              <span id="festivalMessage"></span>
            </section>

            <section class="weather-card">
              <div class="weather-main">
                <div>
                  <p class="location" id="locationText"></p>
                  <p class="condition" id="conditionText"></p>
                </div>
                <img id="weatherIcon" alt="" />
              </div>

              <div class="temperature">
                <span id="temperatureText"></span>
                <small id="feelsLikeText"></small>
              </div>

              <div class="stats-grid">
                <div>
                  <span>Humidity</span>
                  <strong id="humidityText"></strong>
                </div>
                <div>
                  <span>Wind</span>
                  <strong id="windText"></strong>
                </div>
                <div>
                  <span>Range</span>
                  <strong id="rangeText"></strong>
                </div>
                <div>
                  <span>Clouds</span>
                  <strong id="cloudText"></strong>
                </div>
              </div>
            </section>

            <section class="prompt-panel">
              <p id="promptLabel"></p>
              <h2 id="promptSummary"></h2>
              <p id="promptDetails"></p>
              <code id="promptText"></code>
            </section>
          </div>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
